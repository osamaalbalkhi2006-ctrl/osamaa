<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقعات كأس العالم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            color: #f5c842;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #f5c842;
            box-shadow: 0 0 15px rgba(245, 200, 66, 0.2);
        }
        select option {
            background: #1a1a2e;
        }
        button {
            background: #f5c842;
            color: #1a1a2e;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            font-size: 18px;
            padding: 14px;
        }
        button:hover {
            background: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 200, 66, 0.3);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .success {
            display: block !important;
            background: rgba(46, 204, 113, 0.3);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .error {
            display: block !important;
            background: rgba(231, 76, 60, 0.3);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        .loading {
            display: block !important;
            background: rgba(52, 152, 219, 0.3);
            border: 1px solid #3498db;
            color: #3498db;
        }
        .predictions-list {
            margin-top: 30px;
        }
        .prediction-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prediction-item .name {
            font-weight: bold;
            color: #f5c842;
        }
        .prediction-item .match {
            color: #aaa;
            font-size: 14px;
        }
        .prediction-item .result {
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
            text-decoration: none;
        }
        .admin-link:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ توقعات كأس العالم</h1>
        
        <form id="predictionForm">
            <div class="form-group">
                <label>اسمك</label>
                <input type="text" id="name" placeholder="اكتب اسمك..." required>
            </div>
            
            <div class="form-group">
                <label>المباراة</label>
                <select id="match" required>
                    <option value="">اختر المباراة...</option>
                    <option value="مصر vs السنغال">مصر vs السنغال</option>
                    <option value="المغرب vs إسبانيا">المغرب vs إسبانيا</option>
                    <option value="تونس vs فرنسا">تونس vs فرنسا</option>
                    <option value="الجزائر vs البرازيل">الجزائر vs البرازيل</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>توقعك (مثال: 2-1)</label>
                <input type="text" id="prediction" placeholder="مثال: 2-1" required>
            </div>
            
            <button type="submit" id="submitBtn">أرسل توقعك</button>
        </form>
        
        <div id="message"></div>
        
        <div class="predictions-list">
            <h3 style="margin-bottom: 15px; color: #f5c842;">📊 التوقعات السابقة</h3>
            <div id="predictionsContainer">
                <p style="color: #666; text-align: center;">جاري تحميل التوقعات...</p>
            </div>
        </div>
        
        <a href="#" class="admin-link" id="adminLink">🔒 لوحة المشرف (للمشرف فقط)</a>
    </div>

    <script>
        // 🔑 الرابط الصحيح لـ Google Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrHXGh9k_XipF_bI1KZDr1y5jLMG4NaRZL9EgO25fHeiOmtijbt8Ne_UBSc4agt6l3dQ/exec';
        
        // عناصر الصفحة
        const form = document.getElementById('predictionForm');
        const nameInput = document.getElementById('name');
        const matchInput = document.getElementById('match');
        const predictionInput = document.getElementById('prediction');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const predictionsContainer = document.getElementById('predictionsContainer');

        // تحميل التوقعات السابقة عند فتح الصفحة
        loadPredictions();

        // عند إرسال التوقع
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                name: nameInput.value.trim(),
                match: matchInput.value,
                prediction: predictionInput.value.trim()
            };
            
            if (!data.name || !data.match || !data.prediction) {
                showMessage('يرجى ملء جميع الحقول', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الإرسال...';
            showMessage('جاري حفظ توقعك...', 'loading');
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                showMessage('✅ تم حفظ توقعك بنجاح!', 'success');
                form.reset();
                setTimeout(loadPredictions, 2000);
                
            } catch (error) {
                showMessage('❌ حدث خطأ: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'أرسل توقعك';
            }
        });

        // تحميل التوقعات من Google Sheets
        async function loadPredictions() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                if (!Array.isArray(data) || data.length === 0) {
                    predictionsContainer.innerHTML = '<p style="color: #666; text-align: center;">لا توجد توقعات حتى الآن</p>';
                    return;
                }
                
                const recent = data.slice(-10).reverse();
                
                let html = '';
                recent.forEach(row => {
                    const name = row[1] || row.الاسم || 'مجهول';
                    const match = row[2] || row.المباراة || 'غير معروف';
                    const prediction = row[3] || row.التوقع || 'لم يحدد';
                    const actual = row[4] || row.النتيجة_الفعلية || '';
                    const points = row[5] || row.النقاط || '';
                    
                    html += `
                        <div class="prediction-item">
                            <div>
                                <span class="name">${name}</span>
                                <span class="match">${match}</span>
                            </div>
                            <div>
                                <span class="result">${prediction}</span>
                                ${actual ? `<span style="color: #2ecc71; margin-right: 5px;">✅ ${actual}</span>` : ''}
                                ${points ? `<span style="color: #f5c842; margin-right: 5px;">⭐ ${points}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                predictionsContainer.innerHTML = html;
                
            } catch (error) {
                predictionsContainer.innerHTML = '<p style="color: #e74c3c; text-align: center;">فشل تحميل التوقعات</p>';
                console.error('Error loading predictions:', error);
            }
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        setInterval(loadPredictions, 30000);
    </script>
</body>
</html>
