<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقعات كأس العالم 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1, h2, h3 { text-align: center; color: #3ecf8e; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3ecf8e;
            box-shadow: 0 0 15px rgba(62, 207, 142, 0.2);
        }
        select option { background: #1a1a2e; }
        button {
            background: #3ecf8e;
            color: #1a1a2e;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #34b87a; transform: translateY(-2px); }
        .hidden { display: none; }
        #message { margin-top: 10px; padding: 10px; border-radius: 10px; text-align: center; }
        .success { background: rgba(62,207,142,0.3); color: #3ecf8e; }
        .error { background: rgba(231,76,60,0.3); color: #e74c3c; }
        .match-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-right: 4px solid #3ecf8e;
        }
        .points-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .points-table th, .points-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .points-table th { color: #3ecf8e; }
        .admin-link { display: block; text-align: center; margin-top: 20px; color: #3ecf8e; font-size: 12px; cursor: pointer; }
        .admin-link:hover { color: #34b87a; }
        .logout-btn { background: #e74c3c; color: white; margin-bottom: 15px; }
        .logout-btn:hover { background: #c0392b; }
        .subtitle { color: #aaa; font-size: 14px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- شاشة تسجيل الدخول -->
        <div id="loginScreen">
            <h1>⚽ توقعات كأس العالم 2026</h1>
            <p class="subtitle">سجل دخولك لتشارك في التحدي</p>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="أدخل بريدك الإلكتروني">
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" id="loginPassword" placeholder="كلمة السر">
            </div>
            <button onclick="login()">دخول</button>
            <div id="loginMessage"></div>
            <a class="admin-link" onclick="showAdminLogin()">🔒 دخول المشرف</a>
            <a class="admin-link" onclick="showRegister()" style="color:#666;">ليس لديك حساب؟ سجل الآن</a>
        </div>

        <!-- شاشة التسجيل -->
        <div id="registerScreen" class="hidden">
            <h2>📝 تسجيل جديد</h2>
            <div class="form-group">
                <label>اسم اللاعب</label>
                <input type="text" id="regName" placeholder="اسمك">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="regEmail" placeholder="بريدك الإلكتروني">
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" id="regPassword" placeholder="كلمة السر">
            </div>
            <button onclick="register()">تسجيل</button>
            <div id="registerMessage"></div>
            <a class="admin-link" onclick="showLogin()" style="color:#666;">🔙 لديك حساب؟ سجل دخول</a>
        </div>

        <!-- شاشة المشرف -->
        <div id="adminScreen" class="hidden">
            <h2>👑 لوحة المشرف</h2>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
            
            <h3>➕ إضافة مباراة</h3>
            <div class="form-group">
                <label>الفريق الأول</label>
                <input type="text" id="team1" placeholder="مصر">
            </div>
            <div class="form-group">
                <label>علم الفريق الأول (إيموجي)</label>
                <input type="text" id="flag1" placeholder="🇪🇬">
            </div>
            <div class="form-group">
                <label>الفريق الثاني</label>
                <input type="text" id="team2" placeholder="السنغال">
            </div>
            <div class="form-group">
                <label>علم الفريق الثاني (إيموجي)</label>
                <input type="text" id="flag2" placeholder="🇸🇳">
            </div>
            <div class="form-group">
                <label>موعد انتهاء التوقع (بتوقيت جرينتش)</label>
                <input type="datetime-local" id="deadline">
            </div>
            <button onclick="addMatch()">إضافة المباراة</button>

            <hr style="margin:20px 0; border-color:rgba(255,255,255,0.1);">

            <h3>📊 المباريات الحالية</h3>
            <div id="adminMatchesList"></div>

            <hr style="margin:20px 0; border-color:rgba(255,255,255,0.1);">

            <h3>📋 ترتيب اللاعبين</h3>
            <div id="adminLeaderboard"></div>
        </div>

        <!-- شاشة اللاعب -->
        <div id="playerScreen" class="hidden">
            <h2>👤 مرحباً، <span id="playerName">اللاعب</span></h2>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>

            <h3>🏆 مباريات اليوم</h3>
            <div id="todayMatches"></div>

            <h3>📊 ترتيب اللاعبين</h3>
            <div id="playerLeaderboard"></div>
        </div>
    </div>

    <script>
        // 🔥 إعدادات Supabase
        const SUPABASE_URL = 'https://azjvyntnnertgcmvsfmq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FQT6pUUgos4vOgeAqjdQng_stG_DiAi';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // عناصر الشاشة
        const loginScreen = document.getElementById('loginScreen');
        const registerScreen = document.getElementById('registerScreen');
        const adminScreen = document.getElementById('adminScreen');
        const playerScreen = document.getElementById('playerScreen');
        const loginMessage = document.getElementById('loginMessage');
        const registerMessage = document.getElementById('registerMessage');

        // 🔐 دوال تسجيل الدخول
        window.login = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showLoginMessage('يرجى ملء جميع الحقول', 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    showLoginMessage('البريد الإلكتروني أو كلمة السر غير صحيحة', 'error');
                    return;
                }

                currentUser = data;

                if (data.role === 'admin') {
                    showAdminPanel();
                } else {
                    showPlayerPanel(data.name);
                }

            } catch (err) {
                showLoginMessage('خطأ: ' + err.message, 'error');
            }
        };

        // 📝 تسجيل مستخدم جديد
        window.register = async function() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!name || !email || !password) {
                registerMessage.textContent = 'يرجى ملء جميع الحقول';
                registerMessage.className = 'error';
                return;
            }

            try {
                const { data: existing } = await supabase
                    .from('users')
                    .select('id')
                    .eq('email', email)
                    .maybeSingle();

                if (existing) {
                    registerMessage.textContent = 'البريد الإلكتروني مسجل مسبقاً';
                    registerMessage.className = 'error';
                    return;
                }

                const { data, error } = await supabase
                    .from('users')
                    .insert([
                        { name, email, password, role: 'player', total_points: 0 }
                    ])
                    .select()
                    .single();

                if (error) throw error;

                registerMessage.textContent = '✅ تم التسجيل بنجاح!';
                registerMessage.className = 'success';
                setTimeout(() => {
                    showLogin();
                }, 1500);

            } catch (err) {
                registerMessage.textContent = 'خطأ: ' + err.message;
                registerMessage.className = 'error';
            }
        };

        function showAdminPanel() {
            loginScreen.classList.add('hidden');
            registerScreen.classList.add('hidden');
            adminScreen.classList.remove('hidden');
            playerScreen.classList.add('hidden');
            loadAdminMatches();
            loadLeaderboard('adminLeaderboard');
        }

        function showPlayerPanel(name) {
            document.getElementById('playerName').textContent = name;
            loginScreen.classList.add('hidden');
            registerScreen.classList.add('hidden');
            adminScreen.classList.add('hidden');
            playerScreen.classList.remove('hidden');
            loadTodayMatches();
            loadLeaderboard('playerLeaderboard');
        }

        window.logout = function() {
            currentUser = null;
            loginScreen.classList.remove('hidden');
            registerScreen.classList.add('hidden');
            adminScreen.classList.add('hidden');
            playerScreen.classList.add('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            showLoginMessage('تم تسجيل الخروج', 'success');
        };

        function showLoginMessage(text, type) {
            loginMessage.textContent = text;
            loginMessage.className = type;
        }

        window.showRegister = function() {
            loginScreen.classList.add('hidden');
            registerScreen.classList.remove('hidden');
        };

        window.showLogin = function() {
            registerScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
        };

        window.showAdminLogin = function() {
            document.getElementById('loginEmail').value = 'admin@predict.com';
            document.getElementById('loginPassword').value = 'osama2006';
            login();
        };

        // 👑 دوال المشرف
        window.addMatch = async function() {
            const team1 = document.getElementById('team1').value.trim();
            const flag1 = document.getElementById('flag1').value.trim();
            const team2 = document.getElementById('team2').value.trim();
            const flag2 = document.getElementById('flag2').value.trim();
            const deadline = document.getElementById('deadline').value;

            if (!team1 || !team2 || !deadline) {
                alert('يرجى ملء جميع الحقول');
                return;
            }

            try {
                const { error } = await supabase
                    .from('matches')
                    .insert([
                        {
                            team1,
                            team1_flag: flag1 || '🏳️',
                            team2,
                            team2_flag: flag2 || '🏳️',
                            deadline: new Date(deadline).toISOString(),
                            result: '',
                            status: 'upcoming'
                        }
                    ]);

                if (error) throw error;

                alert('✅ تم إضافة المباراة بنجاح');
                document.getElementById('team1').value = '';
                document.getElementById('flag1').value = '';
                document.getElementById('team2').value = '';
                document.getElementById('flag2').value = '';
                document.getElementById('deadline').value = '';
                loadAdminMatches();

            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        async function loadAdminMatches() {
            const container = document.getElementById('adminMatchesList');
            container.innerHTML = '<p>جاري التحميل...</p>';

            try {
                const { data, error } = await supabase
                    .from('matches')
                    .select('*')
                    .order('deadline', { ascending: true });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = '<p>لا توجد مباريات</p>';
                    return;
                }

                let html = '';
                data.forEach(m => {
                    const isPast = new Date(m.deadline) < new Date();
                    html += `
                        <div class="match-card">
                            <div style="font-size:18px;">
                                ${m.team1_flag || '🏳️'} ${m.team1} 🆚 ${m.team2} ${m.team2_flag || '🏳️'}
                            </div>
                            <div style="color:#aaa; font-size:14px;">
                                ⏰ ${new Date(m.deadline).toLocaleString('ar')}
                                ${m.result ? ` | النتيجة: ${m.result}` : ''}
                                ${isPast && !m.result ? ' ⚠️ انتهى الوقت' : ''}
                                <br>
                                <input type="text" id="result_${m.id}" placeholder="النتيجة (2-1)" style="width:60%; margin-top:5px;">
                                <button onclick="setResult('${m.id}')" style="width:35%; padding:5px;">تحديث</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = '<p style="color: #e74c3c;">خطأ في التحميل</p>';
                console.error(err);
            }
        }

        window.setResult = async function(matchId) {
            const result = document.getElementById(`result_${matchId}`).value.trim();
            if (!result) {
                alert('أدخل النتيجة أولاً');
                return;
            }

            try {
                const { error } = await supabase
                    .from('matches')
                    .update({ result, status: 'finished' })
                    .eq('id', matchId);

                if (error) throw error;

                alert('✅ تم تحديث النتيجة');
                await calculatePoints(matchId, result);
                loadAdminMatches();
                loadLeaderboard('adminLeaderboard');

            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        async function calculatePoints(matchId, result) {
            try {
                const { data: predictions, error } = await supabase
                    .from('predictions')
                    .select('*')
                    .eq('match_id', matchId);

                if (error) throw error;

                for (const pred of predictions) {
                    const points = (pred.prediction === result) ? 3 : 0;
                    
                    await supabase
                        .from('predictions')
                        .update({ points })
                        .eq('id', pred.id);

                    await updatePlayerPoints(pred.player_id);
                }

            } catch (err) {
                console.error('خطأ في حساب النقاط:', err);
            }
        }

        async function updatePlayerPoints(playerId) {
            try {
                const { data, error } = await supabase
                    .from('predictions')
                    .select('points')
                    .eq('player_id', playerId);

                if (error) throw error;

                const total = data.reduce((sum, p) => sum + (p.points || 0), 0);

                await supabase
                    .from('users')
                    .update({ total_points: total })
                    .eq('id', playerId);

            } catch (err) {
                console.error('خطأ في تحديث نقاط اللاعب:', err);
            }
        }

        // 📊 لوحة المتصدرين
        async function loadLeaderboard(elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = '<p>جاري التحميل...</p>';

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('name, total_points')
                    .eq('role', 'player')
                    .order('total_points', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = '<p>لا يوجد لاعبون بعد</p>';
                    return;
                }

                let html = `<table class="points-table">
                    <tr><th>#</th><th>اللاعب</th><th>النقاط</th></tr>`;
                data.forEach((player, index) => {
                    html += `<tr>
                        <td>${index + 1}</td>
                        <td>${player.name || 'لاعب'}</td>
                        <td>⭐ ${player.total_points || 0}</td>
                    </tr>`;
                });
                html += '</table>';
                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = '<p style="color: #e74c3c;">خطأ في التحميل</p>';
                console.error(err);
            }
        }

        // 🏟️ مباريات اليوم للاعب
        async function loadTodayMatches() {
            const container = document.getElementById('todayMatches');
            container.innerHTML = '<p>جاري التحميل...</p>';

            try {
                const { data, error } = await supabase
                    .from('matches')
                    .select('*')
                    .eq('status', 'upcoming')
                    .order('deadline', { ascending: true });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = '<p>لا توجد مباريات اليوم</p>';
                    return;
                }

                let html = '';
                for (const m of data) {
                    const isDeadlinePassed = new Date(m.deadline) < new Date();
                    
                    let hasPrediction = false;
                    if (currentUser) {
                        const { data: preds } = await supabase
                            .from('predictions')
                            .select('id')
                            .eq('player_id', currentUser.id)
                            .eq('match_id', m.id)
                            .maybeSingle();
                        hasPrediction = !!preds;
                    }

                    html += `
                        <div class="match-card">
                            <div style="font-size:20px;">
                                ${m.team1_flag || '🏳️'} ${m.team1} 🆚 ${m.team2} ${m.team2_flag || '🏳️'}
                            </div>
                            <div style="color:#aaa; font-size:14px;">
                                ⏰ ${new Date(m.deadline).toLocaleString('ar')}
                                ${isDeadlinePassed ? ' ⛔ انتهى وقت التوقع' : ''}
                                ${hasPrediction ? ' ✅ تم التوقع مسبقاً' : ''}
                            </div>
                            ${!isDeadlinePassed && !hasPrediction ? `
                            <div style="margin-top:10px;">
                                <input type="text" id="pred_${m.id}" placeholder="توقعك (2-1)" style="width:60%;">
                                <button onclick="submitPrediction('${m.id}')" style="width:35%; padding:8px;">أرسل</button>
                            </div>` : ''}
                            ${m.result ? `<div style="color:#3ecf8e; margin-top:5px;">✅ النتيجة: ${m.result}</div>` : ''}
                        </div>
                    `;
                }
                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = '<p style="color: #e74c3c;">خطأ في التحميل</p>';
                console.error(err);
            }
        }

        // إرسال التوقع من اللاعب
        window.submitPrediction = async function(matchId) {
            if (!currentUser) {
                alert('يجب تسجيل الدخول أولاً');
                return;
            }

            const prediction = document.getElementById(`pred_${matchId}`).value.trim();
            if (!prediction) {
                alert('أدخل توقعك');
                return;
            }

            try {
                const { error } = await supabase
                    .from('predictions')
                    .insert([
                        {
                            player_id: currentUser.id,
                            match_id: matchId,
                            prediction: prediction,
                            points: 0,
                            timestamp: new Date().toISOString()
                        }
                    ]);

                if (error) throw error;

                alert('✅ تم إرسال توقعك بنجاح');
                document.getElementById(`pred_${matchId}`).value = '';
                loadTodayMatches();

            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        // إنشاء حساب المشرف تلقائياً
        async function createAdminIfNotExists() {
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('id')
                    .eq('email', 'admin@predict.com')
                    .maybeSingle();

                if (!data) {
                    await supabase
                        .from('users')
                        .insert([
                            {
                                name: 'المشرف',
                                email: 'admin@predict.com',
                                password: 'osama2006',
                                role: 'admin',
                                total_points: 0
                            }
                        ]);
                    console.log('✅ تم إنشاء حساب المشرف');
                }
            } catch (err) {
                console.log('حساب المشرف موجود مسبقاً');
            }
        }
        createAdminIfNotExists();

        console.log('🚀 تطبيق توقعات كأس العالم 2026 جاهز!');
        console.log('👑 المشرف: admin@predict.com / osama2006');
    </script>
</body>
</html>
